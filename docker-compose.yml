services:
  api01: &api
    build: .
    hostname: api01
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    environment:
      PROCESSOR_DEFAULT_URL: http://payment-processor-default:8080
      PROCESSOR_FALLBACK_URL: http://payment-processor-fallback:8080
      GET_PARTIAL_URL: http://api02:8080
    networks:
      - rinha-net
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.6"
          memory: "150MB"

  api02:
    <<: *api
    hostname: api02
    environment:
      PROCESSOR_DEFAULT_URL: http://payment-processor-default:8080
      PROCESSOR_FALLBACK_URL: http://payment-processor-fallback:8080
      GET_PARTIAL_URL: http://api01:8080

  lb:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    networks:
      - rinha-net
    depends_on:
      - api01
      - api02
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: "25MB"

networks:
  rinha-net:
    driver: bridge
  payment-processor:
    external: true
